---
name: builder
env:
  MONITORED_FILES: config.yaml Dockerfile rootfs
on: # yamllint disable-line rule:truthy
  push:
    branches:
      - main
permissions:
  contents: read
  packages: write
jobs:
  init:
    runs-on: ubuntu-latest
    name: Initialize builds
    outputs:
      build_matrix: ${{ steps.matrix.outputs.build_matrix }}
      manifest_matrix: ${{ steps.matrix.outputs.manifest_matrix }}
      changed: ${{ steps.matrix.outputs.changed }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Get changed files
        id: changed_files
        uses: Ana06/get-changed-files@v2.3.0

      - name: Find add-on directories
        id: addons
        uses: home-assistant/actions/helpers/find-addons@master

      - name: Build matrices
        id: matrix
        run: |
          declare -a build_entries
          declare -a manifest_entries

          for addon in ${{ steps.addons.outputs.addons }}; do
            if [[ "${{ steps.changed_files.outputs.all }}" =~ $addon ]]; then
              monitored_changed=false
              for file in ${{ env.MONITORED_FILES }}; do
                if [[ "${{ steps.changed_files.outputs.all }}" =~ $addon/$file ]]; then
                  monitored_changed=true
                  break
                fi
              done
              if [[ "$monitored_changed" != "true" ]]; then
                continue
              fi
            else
              continue
            fi

            version=$(yq '.version' "${addon}/config.yaml")
            image=$(yq '.image' "${addon}/config.yaml")
            registry_prefix=$(echo "$image" | cut -d'/' -f1-2)
            image_name=$(echo "$image" | cut -d'/' -f3)
            architectures=$(yq -o=json '.arch[]' "${addon}/config.yaml" | jq -sc '.')

            for arch in $(echo "$architectures" | jq -r '.[]'); do
              case "$arch" in
                amd64) os="ubuntu-24.04" ;;
                aarch64) os="ubuntu-24.04-arm" ;;
                *)
                  echo "::error::Unsupported architecture: ${arch}"
                  exit 1
                  ;;
              esac
              entry=$(jq -cn \
                --arg addon "$addon" \
                --arg arch "$arch" \
                --arg os "$os" \
                --arg image "${registry_prefix}/${arch}-${image_name}" \
                --arg version "$version" \
                '{addon:$addon,arch:$arch,os:$os,image:$image,version:$version}')
              build_entries+=("$entry")
            done

            entry=$(jq -cn \
              --arg addon "$addon" \
              --arg image_name "$image_name" \
              --arg version "$version" \
              --arg architectures "$(echo "$architectures" | jq -r '. | join(",")')" \
              '{addon:$addon,image_name:$image_name,version:$version,architectures:$architectures}')
            manifest_entries+=("$entry")
          done

          if [[ ${#build_entries[@]} -eq 0 ]]; then
            echo "No add-on had any monitored files changed (${{ env.MONITORED_FILES }})"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            build_json=$(printf '%s,' "${build_entries[@]}")
            echo "build_matrix={\"include\":[${build_json%,}]}" >> "$GITHUB_OUTPUT"
            manifest_json=$(printf '%s,' "${manifest_entries[@]}")
            echo "manifest_matrix={\"include\":[${manifest_json%,}]}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: init
    runs-on: ${{ matrix.os }}
    if: needs.init.outputs.changed == 'true'
    name: Build ${{ matrix.addon }} (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.init.outputs.build_matrix) }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build image
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: ${{ matrix.arch }}
          context: ./${{ matrix.addon }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          cosign: "false"
          image: ${{ matrix.image }}
          image-tags: ${{ matrix.version }}
          push: "true"
          version: ${{ matrix.version }}

  manifest:
    needs: [init, build]
    runs-on: ubuntu-latest
    if: needs.init.outputs.changed == 'true'
    name: Manifest ${{ matrix.addon }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.init.outputs.manifest_matrix) }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.03.2
        with:
          architectures: ${{ matrix.architectures }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          cosign: "false"
          image-name: ${{ matrix.image_name }}
          image-tags: ${{ matrix.version }}
